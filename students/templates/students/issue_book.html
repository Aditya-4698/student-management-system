{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book</title>

    <link rel="stylesheet" href="{% static 'students/css/library.css' %}?v=6">
</head>

<body>

    <!-- 🔥 FLOATING BACK BUTTON -->
    <a href="{% url 'book_list' %}" class="floating-back">
        ⬅ Back
    </a>

    <div class="container">

        <div class="icon">📚</div>

        <h2 class="title">
            Issue Book
            <br>
            <span class="book-name">{{ book.title }}</span>
        </h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Select Student</label>
                <select name="student" required>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Return Date</label>
                <input type="date" name="return_date" required>
            </div>

            <!-- BUTTONS -->
            <div class="btn-group">

                <button type="submit" class="btn">
                    📖 Issue Book
                </button>

                <a href="{% url 'book_list' %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</body>

</html>
